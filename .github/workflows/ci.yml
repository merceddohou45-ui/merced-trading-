steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '18'
      cache: 'npm'

  - name: Install prerequisites (pg_isready)
    run: sudo apt-get update && sudo apt-get install -y postgresql-client

  - name: Wait for Postgres
    run: |
      for i in {1..30}; do
        pg_isready -h localhost -p 5432 -U test -d testdb && break
        echo "Waiting for postgres... ($i)"
        sleep 1
      done

  - name: Install dependencies
    run: npm ci

  - name: Generate Prisma client
    env:
      DATABASE_URL: postgresql://test:pass@localhost:5432/testdb
    run: npx prisma generate

  - name: Run migrations (deploy or fallback to db push)
    env:
      DATABASE_URL: postgresql://test:pass@localhost:5432/testdb
    run: |
      set -e
      echo "Attempting to run prisma migrate deploy..."
      npx prisma migrate deploy || (echo "migrate deploy failed, falling back to db push" && npx prisma db push)

  - name: Run tests
    env:
      DATABASE_URL: postgresql://test:pass@localhost:5432/testdb
      NODE_ENV: test
    run: npm run test

  - name: Upload coverage (optional)
    if: always()
    uses: actions/upload-artifact@v4
    with:
      name: coverage-report
      path: coverage || coverage/** || coverage/* || ./
